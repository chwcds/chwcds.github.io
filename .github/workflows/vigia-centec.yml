name: Vigia Edital Centec

on:
  schedule:
    # 07:00 America/Sao_Paulo = 10:00 UTC
    - cron: "0 10 * * *"
  workflow_dispatch:
    inputs:
      testar_alerta:
        description: "Criar issue de TESTE para conferir se o e-mail de alerta chega"
        type: boolean
        default: false

permissions:
  contents: write
  issues: write

concurrency:
  group: vigia-centec
  cancel-in-progress: false

jobs:
  verificar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install requests beautifulsoup4

      - name: Guardar status anterior
        id: antes
        run: |
          if [ -f vigia-centec/status.json ]; then
            echo "status=$(jq -r '.status' vigia-centec/status.json)" >> "$GITHUB_OUTPUT"
          else
            echo "status=INEXISTENTE" >> "$GITHUB_OUTPUT"
          fi

      - name: Verificar edital
        run: python scripts/verificar_edital.py

      - name: Ler novo status
        id: mudanca
        run: |
          echo "status=$(jq -r '.status' vigia-centec/status.json)" >> "$GITHUB_OUTPUT"

      - name: Commit do status.json
        run: |
          git config user.name "vigia-centec[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add vigia-centec/status.json
          if git diff --cached --quiet; then
            echo "Arquivo idêntico — nada a commitar."
          else
            git commit -m "vigia-centec: status ${{ steps.mudanca.outputs.status }}"
            git push
          fi

      - name: Criar issue de alerta (edital publicado)
        if: >-
          steps.mudanca.outputs.status == 'PUBLICADO' &&
          steps.antes.outputs.status != 'PUBLICADO'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RESUMO=$(jq -r '.resumo' vigia-centec/status.json)
          LINK=$(jq -r '.link' vigia-centec/status.json)
          TRECHOS=$(jq -r '.trechos_encontrados[]? | "- " + .' vigia-centec/status.json)
          gh issue create \
            --title "🚨 EDITAL CENTEC PUBLICADO — Ana Letícia" \
            --body "$(printf '%s\n\n**Link:** %s\n\n**Trechos encontrados:**\n%s\n\n_Alerta automático do Vigia Edital Centec — https://chwcds.github.io/vigia-centec/_' "$RESUMO" "$LINK" "$TRECHOS")"

      - name: Criar issue de TESTE do alerta
        if: github.event_name == 'workflow_dispatch' && inputs.testar_alerta
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "🧪 TESTE DE ALERTA — Vigia Edital Centec" \
            --body "$(printf 'Esta é uma issue de TESTE, criada de propósito para conferir se a notificação por e-mail chega.\n\nSe você recebeu este aviso por e-mail, o alerta do edital está funcionando — no dia, a issue virá com o título \"🚨 EDITAL CENTEC PUBLICADO — Ana Letícia\", o resumo e o link.\n\nPode fechar esta issue depois de conferir.')"
